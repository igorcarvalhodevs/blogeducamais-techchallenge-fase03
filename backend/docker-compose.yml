version: "3.9"

services:
  db:
    image: postgres:16
    container_name: blogeducamais_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blogdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blogdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: blogeducamais_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/blogdb?schema=public
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node src/server.js"

volumes:
  pgdata:

